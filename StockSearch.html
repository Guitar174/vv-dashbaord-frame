<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Card Search — Vision Ventures</title>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f4f6f9; color: #333; }
.header { background: #1a2744; color: white; padding: 20px 32px; }
.header h1 { font-size: 20px; font-weight: 600; }
.header small { font-size: 12px; opacity: 0.65; display: block; margin-top: 2px; }
.tabs { background: #1a2744; display: flex; gap: 4px; padding: 0 32px; }
.tab-btn { padding: 10px 24px; font-size: 14px; font-weight: 600; border: none; border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.15s; border-radius: 6px 6px 0 0; margin-top: 6px; }
.tab-btn[data-tab="1"] { background: #b45309; color: #fef3c7; }
.tab-btn[data-tab="1"]:hover, .tab-btn[data-tab="1"].active { background: #f0b429; color: #1a2744; border-bottom-color: #f0b429; }
.tab-btn[data-tab="2"] { background: #065f46; color: #d1fae5; }
.tab-btn[data-tab="2"]:hover, .tab-btn[data-tab="2"].active { background: #34d399; color: #1a2744; border-bottom-color: #34d399; }
.search-bar { background: white; padding: 16px 32px; border-bottom: 1px solid #e0e0e0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.search-bar input { flex: 1; min-width: 260px; padding: 10px 16px; font-size: 15px; border: 2px solid #d0d7e2; border-radius: 8px; outline: none; transition: border-color 0.2s; }
.search-bar input:focus { border-color: #1a2744; }
select.filter-sel { padding: 10px 14px; font-size: 14px; border: 2px solid #d0d7e2; border-radius: 8px; outline: none; background: white; cursor: pointer; min-width: 160px; }
select.filter-sel:focus { border-color: #1a2744; }
.stats { padding: 8px 32px; font-size: 13px; color: #666; background: white; border-bottom: 1px solid #e0e0e0; }
.stats span { font-weight: 600; color: #1a2744; }
.loading { text-align: center; padding: 60px; font-size: 16px; color: #888; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.table-wrap { padding: 24px 32px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.08); font-size: 14px; }
thead tr { background: #1a2744; color: white; }
thead th { padding: 13px 16px; text-align: left; font-weight: 600; cursor: pointer; user-select: none; white-space: nowrap; }
thead th:hover { background: #253560; }
thead th.sorted-asc::after { content: " ▲"; font-size: 11px; }
thead th.sorted-desc::after { content: " ▼"; font-size: 11px; }
tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.1s; }
tbody tr:hover { background: #f0f4ff; }
tbody tr:last-child { border-bottom: none; }
td { padding: 11px 16px; vertical-align: middle; }
.td-item { font-family: monospace; font-size: 13px; color: #555; }
.td-desc { font-weight: 500; }
.td-brand { display: inline-block; background: #e8edf8; color: #1a2744; padding: 3px 9px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.td-sp { font-family: monospace; font-size: 13px; color: #666; }
.td-nick { font-weight: 600; color: #1a2744; }
.td-qty { font-weight: 700; text-align: right; color: #1a2744; }
.no-results { text-align: center; padding: 48px; color: #999; font-size: 15px; }
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 16px 32px 32px; flex-wrap: wrap; }
.pagination button { padding: 7px 14px; border: 1px solid #d0d7e2; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; }
.pagination button:hover { background: #f0f4ff; border-color: #1a2744; }
.pagination button.active { background: #1a2744; color: white; border-color: #1a2744; }
.pagination button:disabled { opacity: 0.35; cursor: default; }
.page-info { font-size: 13px; color: #666; }
.btn-export { padding: 10px 18px; font-size: 14px; font-weight: 600; background: #1a2744; color: white; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; }
.btn-export:hover { background: #253560; }
</style>
</head>
<body>
<div class="header">
  <h1>Stock Card Search</h1>
  <small id="asof">Vision Ventures &nbsp;|&nbsp; As of 22 June 2026 &nbsp;|&nbsp; Location: H1-F</small>
</div>
<div class="tabs">
  <button class="tab-btn active" data-tab="1" onclick="switchTab(1)">Warehouse Stock</button>
  <button class="tab-btn" data-tab="2" onclick="switchTab(2)">By Salesperson</button>
</div>
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search model name, item no, or description..." autofocus>
  <select id="brandFilter" class="filter-sel"><option value="">All Brands</option></select>
  <select id="spFilter" class="filter-sel" style="display:none"><option value="">All Salespersons</option></select>
  <button class="btn-export" onclick="exportExcel()">⬇ Export Excel</button>
</div>
<div class="stats">
  Showing <span id="countDisplay">—</span> of <span id="totalDisplay">—</span> items &nbsp;|&nbsp; Total Qty: <span id="qtyDisplay">—</span>
</div>
<div class="loading" id="loading">Loading data...</div>
<div id="panels" style="display:none">
  <div class="tab-panel active" id="panel1">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th onclick="sortBy(1,0)" id="t1h0">Item No.</th>
          <th onclick="sortBy(1,1)" id="t1h1">Description</th>
          <th onclick="sortBy(1,2)" id="t1h2">Brand</th>
          <th onclick="sortBy(1,3)" id="t1h3">Qty</th>
          <th onclick="sortBy(1,4)" id="t1h4">Unit Price</th>
        </tr></thead>
        <tbody id="body1"></tbody>
      </table>
      <div class="no-results" id="noResults1" style="display:none">No items found.</div>
    </div>
    <div class="pagination" id="pag1"></div>
  </div>
  <div class="tab-panel" id="panel2">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th onclick="sortBy(2,0)" id="t2h0">Sale Code</th>
          <th onclick="sortBy(2,1)" id="t2h1">Nickname</th>
          <th onclick="sortBy(2,2)" id="t2h2">Item No.</th>
          <th onclick="sortBy(2,3)" id="t2h3">Description</th>
          <th onclick="sortBy(2,4)" id="t2h4">Brand</th>
          <th onclick="sortBy(2,5)" id="t2h5">Qty</th>
          <th onclick="sortBy(2,6)" id="t2h6">Unit Price</th>
        </tr></thead>
        <tbody id="body2"></tbody>
      </table>
      <div class="no-results" id="noResults2" style="display:none">No items found.</div>
    </div>
    <div class="pagination" id="pag2"></div>
  </div>
</div>

<script>
const PAGE_SIZE = 50;
let DATA1 = [], DATA2 = [];
let activeTab = 1;
let state = {
  1: { filtered: [], page: 1, sortCol: -1, sortDir: 1 },
  2: { filtered: [], page: 1, sortCol: -1, sortDir: 1 }
};

async function init() {
  try {
    const [r1, r2] = await Promise.all([
      fetch('stock_data1.json?v=20260622'),
      fetch('stock_data2.json?v=20260622')
    ]);
    DATA1 = await r1.json();
    DATA2 = await r2.json();
  } catch(e) {
    document.getElementById('loading').textContent = 'Failed to load data. Please refresh.';
    return;
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('panels').style.display = '';

  const brands = [...new Set(DATA1.map(d => d.brand))].filter(Boolean).sort();
  const bSel = document.getElementById('brandFilter');
  brands.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; bSel.appendChild(o); });

  const spList = [...new Map(DATA2.map(d => [d.sale_code, d.nickname])).entries()].sort((a,b) => a[0].localeCompare(b[0]));
  const spSel = document.getElementById('spFilter');
  spList.forEach(([code, nick]) => { const o = document.createElement('option'); o.value = code; o.textContent = nick ? code + ' — ' + nick : code; spSel.appendChild(o); });

  applyFilter();
}

function switchTab(t) {
  activeTab = t;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i+1===t));
  document.getElementById('panel1').classList.toggle('active', t===1);
  document.getElementById('panel2').classList.toggle('active', t===2);
  document.getElementById('brandFilter').style.display = t===1 ? '' : 'none';
  document.getElementById('spFilter').style.display = t===2 ? '' : 'none';
  document.getElementById('searchInput').value = '';
  applyFilter();
}

function normalize(s) { return (s||'').toLowerCase(); }

function applyFilter() {
  const q = normalize(document.getElementById('searchInput').value.trim());
  const s = state[activeTab];
  if (activeTab === 1) {
    const brand = document.getElementById('brandFilter').value;
    s.filtered = DATA1.filter(d =>
      (!brand || d.brand === brand) &&
      (!q || normalize(d.item_no).includes(q) || normalize(d.description).includes(q) || normalize(d.brand).includes(q))
    );
  } else {
    const sp = document.getElementById('spFilter').value;
    s.filtered = DATA2.filter(d =>
      (!sp || d.sale_code === sp) &&
      (!q || normalize(d.item_no).includes(q) || normalize(d.description).includes(q) || normalize(d.brand).includes(q) || normalize(d.sale_code).includes(q) || normalize(d.nickname).includes(q))
    );
  }
  if (s.sortCol >= 0) doSort(activeTab);
  s.page = 1;
  render(activeTab);
}

const KEYS1 = ['item_no','description','brand','qty','unit_price'];
const KEYS2 = ['sale_code','nickname','item_no','description','brand','qty','unit_price'];

function sortBy(tab, col) {
  const s = state[tab];
  if (s.sortCol === col) s.sortDir *= -1; else { s.sortCol = col; s.sortDir = 1; }
  const ids = tab===1 ? ['t1h0','t1h1','t1h2','t1h3','t1h4'] : ['t2h0','t2h1','t2h2','t2h3','t2h4','t2h5','t2h6'];
  ids.forEach((id,i) => { const el = document.getElementById(id); if(el) el.className = i===col ? (s.sortDir===1?'sorted-asc':'sorted-desc') : ''; });
  doSort(tab); s.page = 1; render(tab);
}

function doSort(tab) {
  const s = state[tab];
  const k = (tab===1?KEYS1:KEYS2)[s.sortCol];
  s.filtered.sort((a,b) => {
    let va = a[k], vb = b[k];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    return va < vb ? -s.sortDir : va > vb ? s.sortDir : 0;
  });
}

function hl(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return text;
  return text.slice(0,idx) + '<mark style="background:#fff176;border-radius:2px">' + text.slice(idx,idx+q.length) + '</mark>' + text.slice(idx+q.length);
}

function render(tab) {
  const s = state[tab];
  const q = document.getElementById('searchInput').value.trim();
  const totalQty = s.filtered.reduce((sum,d) => sum + d.qty, 0);
  document.getElementById('countDisplay').textContent = s.filtered.length.toLocaleString();
  document.getElementById('totalDisplay').textContent = (tab===1?DATA1:DATA2).length.toLocaleString();
  document.getElementById('qtyDisplay').textContent = totalQty.toLocaleString();
  const start = (s.page-1)*PAGE_SIZE;
  const page = s.filtered.slice(start, start+PAGE_SIZE);
  const tbody = document.getElementById('body'+tab);
  const noRes = document.getElementById('noResults'+tab);
  if (s.filtered.length === 0) {
    tbody.innerHTML = ''; noRes.style.display = '';
  } else {
    noRes.style.display = 'none';
    if (tab === 1) {
      tbody.innerHTML = page.map(d => `<tr>
        <td class="td-item">${hl(d.item_no,q)}</td>
        <td class="td-desc">${hl(d.description,q)}</td>
        <td><span class="td-brand">${hl(d.brand,q)}</span></td>
        <td class="td-qty">${d.qty.toLocaleString()}</td>
        <td class="td-qty">${d.unit_price ? d.unit_price.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}) : '-'}</td>
      </tr>`).join('');
    } else {
      tbody.innerHTML = page.map(d => `<tr>
        <td class="td-sp">${hl(d.sale_code,q)}</td>
        <td class="td-nick">${hl(d.nickname,q)}</td>
        <td class="td-item">${hl(d.item_no,q)}</td>
        <td class="td-desc">${hl(d.description,q)}</td>
        <td><span class="td-brand">${hl(d.brand,q)}</span></td>
        <td class="td-qty">${d.qty.toLocaleString()}</td>
        <td class="td-qty">${d.unit_price ? d.unit_price.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}) : '-'}</td>
      </tr>`).join('');
    }
  }
  renderPag(tab);
}

function renderPag(tab) {
  const s = state[tab];
  const total = Math.ceil(s.filtered.length / PAGE_SIZE);
  const pag = document.getElementById('pag'+tab);
  if (total <= 1) { pag.innerHTML = ''; return; }
  let h = `<button onclick="goPage(${tab},${s.page-1})" ${s.page===1?'disabled':''}>&#8592; Prev</button>`;
  pagRange(s.page, total).forEach(p => {
    if (p==='...') h += `<span class="page-info">…</span>`;
    else h += `<button class="${p===s.page?'active':''}" onclick="goPage(${tab},${p})">${p}</button>`;
  });
  h += `<button onclick="goPage(${tab},${s.page+1})" ${s.page===total?'disabled':''}>Next &#8594;</button>`;
  h += `<span class="page-info">Page ${s.page} of ${total}</span>`;
  pag.innerHTML = h;
}

function pagRange(cur, total) {
  const pages = [];
  for (let i = Math.max(1,cur-2); i <= Math.min(total,cur+2); i++) pages.push(i);
  if (pages[0] > 1) { if (pages[0] > 2) pages.unshift('...'); pages.unshift(1); }
  if (pages[pages.length-1] < total) { if (pages[pages.length-1] < total-1) pages.push('...'); pages.push(total); }
  return pages;
}

function goPage(tab, p) {
  const total = Math.ceil(state[tab].filtered.length / PAGE_SIZE);
  if (p < 1 || p > total) return;
  state[tab].page = p;
  render(tab);
  window.scrollTo({top:0,behavior:'smooth'});
}

function exportExcel() {
  const s = state[activeTab];
  const headers = activeTab === 1
    ? ['Item No.','Description','Brand','Qty','Unit Price']
    : ['Sale Code','Nickname','Item No.','Description','Brand','Qty','Unit Price'];
  const keys = activeTab === 1 ? KEYS1 : KEYS2;
  const rows = s.filtered.map(d => keys.map(k => d[k]));
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, activeTab === 1 ? 'Warehouse Stock' : 'By Salesperson');
  XLSX.writeFile(wb, 'StockCard_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

document.getElementById('searchInput').addEventListener('input', applyFilter);
document.getElementById('brandFilter').addEventListener('change', applyFilter);
document.getElementById('spFilter').addEventListener('change', applyFilter);
init();
</script>
</body>
</html>
